services:
  mongodb:
    image: mongo:7
    container_name: baking-shop-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: baking-shop
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - baking-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok'
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: baking-shop-server
    env_file:
      - ./server/.env
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password@mongodb:27017/baking-shop?authSource=admin
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - baking-network
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        REACT_APP_SERVER_URL: http://baking-shop-server:5000
    container_name: baking-shop-client
    ports:
      - "3000:3000"
    depends_on:
      - server
    networks:
      - baking-network
    restart: unless-stopped

volumes:
  mongodb_data:
  mongodb_config:

networks:
  baking-network:
    driver: bridge
