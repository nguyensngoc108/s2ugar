services:
  mongodb:
    image: mongo:7
    container_name: baking-shop-db-prod
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: baking-shop
    volumes:
      - mongodb_data_prod:/data/db
      - mongodb_config_prod:/data/configdb
    networks:
      - baking-network-prod
    restart: always
    healthcheck:
      test: echo 'db.runCommand("ping").ok'
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: ghcr.io/${GITHUB_REPOSITORY}/baking-server:latest
    container_name: baking-shop-server-prod
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/baking-shop?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - baking-network-prod
    restart: always

  client:
    image: ghcr.io/${GITHUB_REPOSITORY}/baking-client:latest
    container_name: baking-shop-client-prod
    ports:
      - "80:3000"
    environment:
      REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL}
    depends_on:
      - server
    networks:
      - baking-network-prod
    restart: always

volumes:
  mongodb_data_prod:
  mongodb_config_prod:

networks:
  baking-network-prod:
    driver: bridge
